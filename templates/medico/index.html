{% extends "base.html" %}
{% block content %}
<h2>Médicos</h2>
<a href="{{ url_for('medico.create') }}" class="btn btn-primary mb-3">Nuevo Médico</a>
<table class="table table-bordered">
    <thead><tr><th>ID</th><th>Nombre</th><th>Especialidad</th><th>Teléfono</th><th>Correo</th><th>Acciones</th></tr></thead>
    <tbody>
        {% for m in medicos %}
        <tr>
            <td>{{ m.id_medico }}</td><td>{{ m.nombre }}</td><td>{{ m.especialidad }}</td>
            <td>{{ m.telefono }}</td><td>{{ m.correo }}</td>
            <td>
                <a href="{{ url_for('medico.edit', id=m.id_medico) }}" class="btn btn-warning btn-sm">Editar</a>
                <a href="{{ url_for('medico.delete', id=m.id_medico) }}" class="btn btn-danger btn-sm" onclick="return confirm('¿Eliminar?')">Eliminar</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
