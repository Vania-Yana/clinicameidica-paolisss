{% extends "base.html" %}
{% block content %}
<h2>Editar Médico</h2>
<form method="POST">
    <div class="mb-3"><label>Nombre</label><input type="text" name="nombre" class="form-control" value="{{ medico.nombre }}" required></div>
    <div class="mb-3"><label>Especialidad</label><input type="text" name="especialidad" class="form-control" value="{{ medico.especialidad }}" required></div>
    <div class="mb-3"><label>Teléfono</label><input type="text" name="telefono" class="form-control" value="{{ medico.telefono }}" required></div>
    <div class="mb-3"><label>Correo</label><input type="email" name="correo" class="form-control" value="{{ medico.correo }}" required></div>
    <button type="submit" class="btn btn-warning">Actualizar</button>
    <a href="{{ url_for('medico.index') }}" class="btn btn-secondary">Cancelar</a>
</form>
{% endblock %}
