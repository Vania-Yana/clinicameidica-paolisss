{% extends "base.html" %}
{% block content %}
<h2>Lista de Pacientes</h2>
<a href="{{ url_for('paciente.create') }}" class="btn btn-primary mb-3">Nuevo Paciente</a>
<table class="table table-bordered table-hover">
    <thead class="table-dark">
        <tr><th>ID</th><th>Nombre</th><th>Edad</th><th>Dirección</th><th>Teléfono</th><th>Acciones</th></tr>
    </thead>
    <tbody>
        {% for p in pacientes %}
        <tr>
            <td>{{ p.id_paciente }}</td><td>{{ p.nombre }}</td><td>{{ p.edad }}</td>
            <td>{{ p.direccion }}</td><td>{{ p.telefono }}</td>
            <td>
                <a href="{{ url_for('paciente.edit', id=p.id_paciente) }}" class="btn btn-warning btn-sm">Editar</a>
                <a href="{{ url_for('paciente.delete', id=p.id_paciente) }}" class="btn btn-danger btn-sm" onclick="return confirm('¿Eliminar paciente?')">Eliminar</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
