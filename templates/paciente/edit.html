{% extends "base.html" %}
{% block content %}
<h2>Editar Paciente</h2>
<form method="POST">
    <div class="mb-3"><label>Nombre</label><input type="text" name="nombre" class="form-control" value="{{ paciente.nombre }}" required></div>
    <div class="mb-3"><label>Edad</label><input type="number" name="edad" class="form-control" value="{{ paciente.edad }}" required></div>
    <div class="mb-3"><label>Dirección</label><input type="text" name="direccion" class="form-control" value="{{ paciente.direccion }}" required></div>
    <div class="mb-3"><label>Teléfono</label><input type="text" name="telefono" class="form-control" value="{{ paciente.telefono }}" required></div>
    <button type="submit" class="btn btn-warning">Actualizar</button>
    <a href="{{ url_for('paciente.index') }}" class="btn btn-secondary">Cancelar</a>
</form>
{% endblock %}
